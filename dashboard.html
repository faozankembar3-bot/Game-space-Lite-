<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Game Space Lite</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: Arial, Helvetica, sans-serif;
    background:#ffffff;
    background-image:
      radial-gradient(circle, #cdd4e0 1.5px, transparent 1.5px),
      radial-gradient(circle at 15% 10%, rgba(47,107,255,0.08), transparent 38%),
      radial-gradient(circle at 90% 85%, rgba(47,107,255,0.06), transparent 42%);
    background-size: 20px 20px, auto, auto;
    color:#111315;
    min-height:100vh;
    overflow-y:auto;
    display:flex;
    justify-content:center;
    padding:28px 14px 50px;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(12px);}
    to{opacity:1; transform:translateY(0);}
  }

  /* Loading screen */
  #loading{
    position:fixed; inset:0; background:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; color:#8a909c; z-index:99;
  }

  .wrap{
    width:100%; max-width:390px;
    animation: fadeUp .5s ease both;
    display:none;
  }

  /* Header */
  .dash-header{
    display:flex; justify-content:space-between;
    align-items:center; margin-bottom:24px;
  }
  .dash-brand{ font-size:17px; font-weight:700; color:#111315; }
  .dash-brand span{ color:#2f6bff; }
  .dash-user{ display:flex; align-items:center; gap:8px; }
  .avatar{
    width:32px; height:32px; border-radius:50%;
    background:#2f6bff; border:1.5px solid #111315;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:#fff; flex-shrink:0;
  }
  .dash-username{
    font-size:12.5px; color:#111315; font-weight:600;
    max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .logout{
    background:#fff; border:1.5px solid #111315; color:#111315;
    padding:6px 11px; border-radius:6px; font-size:11.5px;
    cursor:pointer; font-weight:600; transition: background .15s ease;
  }
  .logout:hover{ background:#f4f5f7; }

  /* Welcome banner */
  .dash-banner{
    background:#2f6bff; border:1.5px solid #111315;
    border-radius:12px; padding:18px 18px 16px;
    margin-bottom:20px; position:relative; overflow:hidden;
  }
  .dash-banner::before{
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.13) 1.5px, transparent 1.5px);
    background-size: 18px 18px;
  }
  .dash-banner h2{ font-size:16px; font-weight:700; color:#fff; position:relative; }
  .dash-banner p{ font-size:12px; color:rgba(255,255,255,0.75); margin-top:4px; position:relative; }

  /* Stats */
  .stats-row{ display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin-bottom:20px; }
  .stat-card{
    background:#fff; border:1.5px solid #111315; border-radius:10px;
    padding:14px 10px; text-align:center;
  }
  .stat-val{ font-size:20px; font-weight:700; color:#111315; }
  .stat-label{ font-size:10px; color:#8a909c; margin-top:3px; text-transform:uppercase; letter-spacing:0.04em; }

  /* Section title */
  .section-title{
    font-size:11px; font-weight:700; color:#8a909c;
    text-transform:uppercase; letter-spacing:0.07em; margin-bottom:10px;
  }

  /* Menu */
  .menu-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
  .menu-item{
    background:#fff; border:1.5px solid #111315; border-radius:10px;
    padding:13px 14px; display:flex; align-items:center; gap:12px;
    cursor:pointer; transition: background .15s ease;
    text-decoration:none;
  }
  .menu-item:hover{ background:#f7f8fa; }
  .menu-item:active{ background:#f0f1f4; }
  .menu-icon{
    width:36px; height:36px; background:#eef3ff;
    border:1.5px solid #c9d8ff; border-radius:8px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .menu-icon svg{ width:18px; height:18px; stroke:#2f6bff; fill:none; stroke-width:1.8; }
  .menu-text{ flex:1; }
  .menu-text strong{ display:block; font-size:13.5px; color:#111315; }
  .menu-text span{ font-size:11.5px; color:#8a909c; }
  .menu-arrow{ color:#c5cad4; font-size:18px; }

  /* Profile card */
  .profile-card{
    background:#fff; border:1.5px solid #111315; border-radius:10px;
    padding:16px 14px; display:flex; align-items:center; gap:12px;
  }
  .avatar-lg{
    width:44px; height:44px; border-radius:50%;
    background:#2f6bff; border:1.5px solid #111315;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:700; color:#fff; flex-shrink:0;
  }
  .profile-info strong{ display:block; font-size:14px; color:#111315; }
  .profile-info span{ font-size:12px; color:#8a909c; }
</style>
</head>
<body>

<div id="loading">Loading…</div>

<div class="wrap" id="dashWrap">

  <!-- Header -->
  <div class="dash-header">
    <div class="dash-brand">Game<span>Space</span> Lite</div>
    <div class="dash-user">
      <div class="avatar" id="avatarCircle">?</div>
      <div class="dash-username" id="whoami">—</div>
      <button type="button" class="logout" id="logoutBtn">Log out</button>
    </div>
  </div>

  <!-- Banner -->
  <div class="dash-banner">
    <h2>Welcome back 👾</h2>
    <p>Your game overlay is ready. Customize it below.</p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://ipiukuhjmafjafelepzf.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_9WeXrHHP82edhibhOB7w8Q_rtExteHc";

  function initWhenReady(){
    if (!window.supabase || !window.supabase.createClient){ setTimeout(initWhenReady, 100); return; }
    runDashboard(window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
  }

  function runDashboard(supabase){
    supabase.auth.getSession().then(({ data }) => {
      if (!data.session){
        window.location.href = 'index.html';
        return;
      }
      fillUser(data.session.user);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashWrap').style.display = 'block';
    });

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT') window.location.href = 'index.html';
    });

    document.getElementById('logoutBtn').addEventListener('click', async ()=>{
      await supabase.auth.signOut();
    });
  }

  function fillUser(user){
    const name = (user.user_metadata && (user.user_metadata.full_name || user.user_metadata.username)) || user.email || 'User';
    const initial = name.charAt(0).toUpperCase();
    document.getElementById('whoami').textContent = name.split(' ')[0];
    document.getElementById('avatarCircle').textContent = initial;
  }

  initWhenReady();
</script>
</body>
</html>
